name: Reusable - Python Tests (Poetry)

on:
  workflow_call:
    inputs:
      python-versions:
        description: "Array JSON de versões Python para matrix (ex.: '[\"3.10\"]' ou '[\"3.9\",\"3.10\",\"3.11\"]')"
        required: false
        type: string
        default: '["3.10"]'
      poetry-version:
        description: "Versão do Poetry"
        required: false
        type: string
        default: "1.6.1"
      working-directory:
        description: "Diretório onde estão pyproject.toml e os testes"
        required: false
        type: string
        default: "."
      run-codecov:
        description: "Se true, faz upload de coverage.xml para Codecov"
        required: false
        type: boolean
        default: true
      test-command:
        description: "Comando que executa os testes e produz coverage.xml na working-directory"
        required: false
        type: string
        default: "poetry run coverage run -m pytest && poetry run coverage xml"
      environment:
        description: "GitHub Environment opcional (ex.: Development)"
        required: false
        type: string
        default: ""
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    if: github.actor != 'actions[bot]'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ inputs.poetry-version }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Upload coverage to Codecov
        if: ${{ inputs.run-codecov }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.working-directory }}/coverage.xml
