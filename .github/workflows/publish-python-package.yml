name: Reusable - Publish Python Package

on:
  workflow_call:
    inputs:
      python-version:
        description: "Versão do Python"
        required: false
        type: string
        default: "3.10"
      poetry-version:
        description: "Versão do Poetry"
        required: false
        type: string
        default: "1.6.1"
      environment:
        description: "GitHub Environment com regras de proteção"
        required: false
        type: string
        default: "Production"
      label-gate:
        description: "Label que autoriza o deploy"
        required: false
        type: string
        default: "deployable"
    secrets:
      PYPI_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish to PyPI
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, inputs.label-gate)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ inputs.poetry-version }}
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(poetry version -s)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Build package
        run: poetry build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}
          name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        run: |
          poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}
          poetry publish
